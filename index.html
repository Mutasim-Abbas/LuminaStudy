<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2e3192" />
    <meta
      name="description"
      content="Lumina Study — AI-generated flashcards and quizzes from your notes, plus a grade calculator and degree planner that tells you exactly what score you need."
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>Lumina Study</title>
    <script>
      // Resolve the theme before first paint so the page never flashes light
      // then snap to dark. Mirrors src/hooks/useTheme.ts — keep both in sync.
      (function () {
        try {
          var stored = localStorage.getItem('lumina.theme');
          var resolved =
            stored === 'light' || stored === 'dark'
              ? stored
              : window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
